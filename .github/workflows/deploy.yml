name: CI/CD Pipeline - Docker Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-api:latest ./app

      - name: Push vers Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-api:latest

      - name: Vérification de l'image
        run: docker inspect ${{ secrets.DOCKER_USERNAME }}/todo-api:latest
